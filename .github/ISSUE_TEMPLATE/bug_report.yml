name: Bug Report
description: Report a bug in NovaTerm
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open NovaTerm
        2. Run command '...'
        3. See error
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g., Pixel 8 Pro, Samsung S24, Xiaomi 15T Pro"
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android version
      placeholder: "e.g., Android 15 (API 35)"
    validations:
      required: true
  - type: input
    id: novaterm
    attributes:
      label: NovaTerm version
      placeholder: "e.g., 0.2.0-alpha"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant logcat output
      render: shell
