name: Build GPU Renderer

# Compiles libnovaterm.so with Vulkan/wgpu GPU feature for arm64-v8a.
# Triggered manually or when rust-core changes on main.
# The resulting .so is committed back to app/src/main/jniLibs/arm64-v8a/
# so the next Gradle build picks it up automatically.

on:
  workflow_dispatch:
    inputs:
      commit_result:
        description: 'Commit .so back to repo (yes/no)'
        required: false
        default: 'yes'
  push:
    branches: [main]
    paths:
      - 'rust-core/**'
      - '.github/workflows/build-gpu.yml'

permissions:
  contents: write       # create branch with updated .so
  pull-requests: write  # open PR to main

concurrency:
  group: gpu-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: '26.1.10909125'
  RUST_TARGET: 'aarch64-linux-android'
  ANDROID_PLATFORM: '30'

jobs:
  build-gpu-so:
    name: Cross-compile libnovaterm.so (GPU/Vulkan, arm64)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          # Full history needed for auto-commit
          fetch-depth: 0

      # ── Rust toolchain ────────────────────────────────────────
      - name: Install Rust stable + aarch64-linux-android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGET }}

      # ── Rust + Cargo cache ────────────────────────────────────
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core -> target
          # Key includes feature flags so cache invalidates on feature changes
          key: gpu-vulkan-${{ env.RUST_TARGET }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # ── Android NDK ───────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          sdkmanager "ndk;${{ env.NDK_VERSION }}" --sdk_root="$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      # ── cargo-ndk ─────────────────────────────────────────────
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version "^3.5" --locked

      # ── Build ─────────────────────────────────────────────────
      - name: Build libnovaterm.so with GPU/Vulkan feature
        working-directory: rust-core
        env:
          # Required by wgpu on Android: tell ash (Vulkan loader) where to find libvulkan.so
          CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS: '-C link-arg=-landroid -C link-arg=-llog'
        run: |
          cargo ndk \
            --target ${{ env.RUST_TARGET }} \
            --platform ${{ env.ANDROID_PLATFORM }} \
            --manifest-path novaterm-bridge/Cargo.toml \
            -- build --release --features gpu --locked

      # ── Copy & verify ─────────────────────────────────────────
      - name: Copy .so to jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp rust-core/target/${{ env.RUST_TARGET }}/release/libnovaterm.so \
             app/src/main/jniLibs/arm64-v8a/libnovaterm.so

      - name: Verify .so — size, architecture, exported symbols
        run: |
          SO=app/src/main/jniLibs/arm64-v8a/libnovaterm.so
          echo "=== Size ==="
          ls -lh "$SO"
          echo "=== Architecture (expect AArch64) ==="
          file "$SO"
          echo "=== Key JNI exports (expect Java_com_novaterm_*) ==="
          nm --dynamic "$SO" 2>/dev/null | grep "Java_com_novaterm" | head -20 || \
            objdump -T "$SO" 2>/dev/null | grep "Java_com_novaterm" | head -20
          echo "=== GPU-specific symbols ==="
          nm --dynamic "$SO" 2>/dev/null | grep -i "vulkan\|wgpu\|render" | head -10 || true
          echo "=== SHA-256 ==="
          sha256sum "$SO"

      # ── Upload artifact (always) ──────────────────────────────
      - name: Upload libnovaterm.so as artifact
        uses: actions/upload-artifact@v4
        with:
          name: libnovaterm-gpu-arm64-${{ github.sha }}
          path: app/src/main/jniLibs/arm64-v8a/libnovaterm.so
          retention-days: 90

      # ── Open PR with updated .so ──────────────────────────────
      # Direct push to main is blocked by branch protection (requires CI to pass).
      # Instead, open a PR from a short-lived branch — CI runs on the PR and
      # the user (or auto-merge) lands it normally.
      - name: Open PR with updated libnovaterm.so
        if: |
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' ||
           github.event.inputs.commit_result == 'yes')
        uses: peter-evans/create-pull-request@v7
        with:
          # GH_PAT required: org policy blocks GITHUB_TOKEN from creating PRs.
          # Create a fine-grained PAT with Contents+PRs write on nvterm/NovaTerm,
          # then add it as repo secret GH_PAT.
          token: ${{ secrets.GH_PAT }}
          add-paths: app/src/main/jniLibs/arm64-v8a/libnovaterm.so
          commit-message: "chore: update libnovaterm.so (GPU/Vulkan, arm64)"
          branch: chore/update-gpu-renderer
          title: "chore: update libnovaterm.so (GPU/Vulkan, arm64)"
          body: |
            Auto-generated by [Build GPU Renderer](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.

            | Field | Value |
            |-------|-------|
            | Built from | `${{ github.sha }}` |
            | Feature | `gpu` (wgpu 29 Vulkan) |
            | Target | `aarch64-linux-android` (arm64-v8a) |

            Merge this PR to land the GPU renderer in the next APK build.
          labels: automated,gpu-renderer
          delete-branch: true
