name: Update Bootstrap

# Downloads the latest bootstrap from PrometeoDEV/novaterm-packages
# and commits it to app/src/main/cpp/ for APK embedding.
#
# The actual bootstrap build happens in novaterm-packages repo.
# This workflow just pulls the result and updates NovaTerm.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag from novaterm-packages (empty = latest)'
        required: false
        default: ''

jobs:
  update-bootstrap:
    name: Download and update bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download bootstrap from novaterm-packages
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            # Get latest release
            TAG=$(gh api repos/PrometeoDEV/novaterm-packages/releases/latest --jq '.tag_name')
          fi
          echo "Downloading bootstrap from release: $TAG"

          gh release download "$TAG" \
            --repo PrometeoDEV/novaterm-packages \
            --pattern "bootstrap-aarch64.zip" \
            --dir app/src/main/cpp/

          # Verify
          ls -lh app/src/main/cpp/bootstrap-aarch64.zip
          sha256sum app/src/main/cpp/bootstrap-aarch64.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated bootstrap
        run: |
          git config user.name "NovaTerm Bot"
          git config user.email "bot@novaterm.dev"
          git add app/src/main/cpp/bootstrap-aarch64.zip
          if git diff --cached --quiet; then
            echo "No changes to bootstrap"
          else
            git commit -m "chore: update bootstrap from novaterm-packages ($TAG)"
            git push
          fi
