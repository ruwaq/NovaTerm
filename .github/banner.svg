<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d2021"/>
      <stop offset="100%" style="stop-color:#282828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d79921"/>
      <stop offset="100%" style="stop-color:#fabd2f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid lines (subtle) -->
  <g stroke="#3c3836" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Terminal window mockup (left) -->
  <rect x="40" y="40" width="460" height="240" rx="8" fill="#1c1c1c" stroke="#504945" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="40" y="40" width="460" height="32" rx="8" fill="#3c3836"/>
  <rect x="40" y="56" width="460" height="16" fill="#3c3836"/>
  <!-- Traffic lights -->
  <circle cx="64" cy="56" r="7" fill="#cc241d"/>
  <circle cx="88" cy="56" r="7" fill="#d79921"/>
  <circle cx="112" cy="56" r="7" fill="#98971a"/>
  <!-- Tab title -->
  <text x="200" y="61" font-family="monospace" font-size="12" fill="#ebdbb2" text-anchor="middle">novaterm — bash</text>

  <!-- Terminal content -->
  <text x="60" y="100" font-family="monospace" font-size="13" fill="#98971a">~/projects/myapp</text>
  <text x="60" y="100" font-family="monospace" font-size="13" fill="#ebdbb2" dx="170"> $ </text>
  <text x="60" y="100" font-family="monospace" font-size="13" fill="#fabd2f" dx="205">claude</text>

  <text x="60" y="122" font-family="monospace" font-size="13" fill="#83a598">  ╭──────────────────────────╮</text>
  <text x="60" y="140" font-family="monospace" font-size="13" fill="#83a598">  │ Claude Code  v1.9.0      │</text>
  <text x="60" y="158" font-family="monospace" font-size="13" fill="#83a598">  │ ✓ MCP tools connected    │</text>
  <text x="60" y="176" font-family="monospace" font-size="13" fill="#83a598">  ╰──────────────────────────╯</text>

  <text x="60" y="204" font-family="monospace" font-size="13" fill="#98971a">~/projects/myapp</text>
  <text x="60" y="204" font-family="monospace" font-size="13" fill="#ebdbb2" dx="170"> $ </text>
  <text x="60" y="204" font-family="monospace" font-size="13" fill="#ebdbb2" dx="205">▌</text>

  <!-- Right side: branding -->
  <!-- NovaTerm wordmark -->
  <text x="560" y="115" font-family="monospace,sans-serif" font-size="64" font-weight="bold"
        fill="url(#accent)" filter="url(#glow)" letter-spacing="-2">NovaTerm</text>

  <!-- Tagline -->
  <text x="562" y="150" font-family="sans-serif" font-size="18" fill="#a89984" letter-spacing="0.5">
    Rust · GPU · AI-native · Android
  </text>

  <!-- Feature pills -->
  <g font-family="monospace" font-size="12">
    <!-- Pill 1 -->
    <rect x="562" y="170" width="140" height="26" rx="13" fill="#3c3836" stroke="#d79921" stroke-width="1"/>
    <text x="632" y="187" fill="#fabd2f" text-anchor="middle">wgpu Vulkan</text>
    <!-- Pill 2 -->
    <rect x="712" y="170" width="130" height="26" rx="13" fill="#3c3836" stroke="#98971a" stroke-width="1"/>
    <text x="777" y="187" fill="#b8bb26" text-anchor="middle">177 Rust tests</text>
    <!-- Pill 3 -->
    <rect x="852" y="170" width="110" height="26" rx="13" fill="#3c3836" stroke="#83a598" stroke-width="1"/>
    <text x="907" y="187" fill="#8ec07c" text-anchor="middle">MCP server</text>
    <!-- Pill 4 -->
    <rect x="972" y="170" width="120" height="26" rx="13" fill="#3c3836" stroke="#d3869b" stroke-width="1"/>
    <text x="1032" y="187" fill="#d3869b" text-anchor="middle">Android 11+</text>
  </g>

  <!-- Stats row -->
  <g font-family="sans-serif" fill="#ebdbb2">
    <text x="562" y="242" font-size="13" fill="#a89984">Open source · Apache 2.0 · arm64-v8a</text>
  </g>

  <!-- Download button hint -->
  <rect x="562" y="256" width="220" height="38" rx="8" fill="#d79921"/>
  <text x="672" y="280" font-family="sans-serif" font-size="15" font-weight="bold"
        fill="#1d2021" text-anchor="middle">↓ Download APK</text>

  <!-- Version badge -->
  <rect x="800" y="256" width="160" height="38" rx="8" fill="#3c3836" stroke="#504945" stroke-width="1"/>
  <text x="880" y="280" font-family="monospace" font-size="13"
        fill="#98971a" text-anchor="middle">v0.3.1-alpha</text>
</svg>
