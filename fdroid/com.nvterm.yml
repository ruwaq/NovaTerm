Name: NovaTerm - AI Terminal
Summary: Rust-powered, GPU-accelerated, AI-native terminal for Android
Description: |-
  NovaTerm is the next-generation Android terminal emulator — Rust-powered,
  GPU-accelerated, and AI-native. Runs on any Android 11+ phone.

  '''Features:'''
  * Rust core — VT parser (alacritty_terminal), safe PTY, 177+ tests
  * GPU rendering — wgpu + Vulkan compute shaders, software fallback for all phones
  * AI-native — MCP server, on-device LLM (Gemma/Qwen3), command suggestions
  * Session persistence — SQLite + CAS dedup + boot restore
  * 7 color schemes — Gruvbox, Catppuccin, Solarized, Monokai, Nord, Dracula
  * PiP floating terminal, voice input, history search
  * Professional shell config out of the box
  * Optimized for Claude Code, Gemini CLI, Aider

  Terminal emulation core from Termux (Apache 2.0).

